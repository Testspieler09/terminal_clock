name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: terminal_clock
            asset_name: terminal_clock-linux-x86_64.tar.gz
          - os: windows-latest
            artifact_name: terminal_clock.exe
            asset_name: terminal_clock-windows-x86_64.zip
          - os: macos-latest
            artifact_name: terminal_clock
            asset_name: terminal_clock-macos-x86_64.tar.gz

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build Release
      run: cargo build --release --locked

    - name: Package (Unix)
      if: runner.os != 'Windows'
      run: |
        cd target/release
        tar czf ../../${{ matrix.asset_name }} ${{ matrix.artifact_name }}

    - name: Package (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cd target/release
        Compress-Archive -Path ${{ matrix.artifact_name }} -DestinationPath ..\..\${{ matrix.asset_name }}

    - name: Upload Release Asset
      uses: softprops/action-gh-release@v2
      with:
        files: ${{ matrix.asset_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
